<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 西語鍛造 Daily Forge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
:root{--bg:#0d0d18;--surface:#141428;--card:#1a1a35;--border:#2a2a50;--accent:#7b5ea7;--accent2:#a78bfa;--accent3:#c4b5fd;--gold:#f5c842;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:80px;}
body::before{content:'';position:fixed;top:-20%;left:-10%;width:50%;height:50%;background:radial-gradient(ellipse,rgba(123,94,167,0.1) 0%,transparent 70%);pointer-events:none;}

.header{position:sticky;top:0;z-index:100;background:rgba(13,13,24,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;color:var(--accent3);}
.logo span{color:var(--dim);font-weight:300;font-size:0.8rem;margin-left:6px;}
.stats-row{display:flex;gap:8px;align-items:center;}
.chip{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:3px 10px;font-size:0.75rem;font-family:'Space Grotesk',sans-serif;}
.chip .v{font-weight:700;color:var(--accent2);}
.chip.s .v{color:var(--gold);}
.chip.w .v{color:var(--green);}

.wrap{max-width:680px;margin:0 auto;padding:18px 14px;position:relative;z-index:1;}

/* XP */
.xp-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 18px;margin-bottom:16px;}
.xp-top{display:flex;justify-content:space-between;margin-bottom:8px;}
.xp-lbl{font-size:0.68rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;letter-spacing:0.1em;text-transform:uppercase;}
.xp-num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.82rem;color:var(--gold);}
.xp-track{height:7px;background:var(--surface);border-radius:999px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:999px;transition:width 0.9s cubic-bezier(.4,0,.2,1);}
.xp-lvl{font-size:0.68rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;text-align:right;margin-top:6px;}

/* VOICE */
.voice-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.voice-bar label{font-size:0.75rem;color:var(--muted);font-family:'Space Grotesk',sans-serif;white-space:nowrap;}
.voice-bar select{flex:1;min-width:100px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:5px 8px;font-size:0.78rem;font-family:inherit;outline:none;}
.voice-bar select:focus{border-color:var(--accent);}
.vtest{background:rgba(123,94,167,0.2);border:1px solid var(--accent);color:var(--accent2);border-radius:8px;padding:5px 12px;font-size:0.75rem;font-family:'Space Grotesk',sans-serif;cursor:pointer;white-space:nowrap;}
.vtest:hover{background:rgba(123,94,167,0.35);}
.vstatus{font-size:0.7rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;}
.vstatus.ok{color:var(--green);}
.vstatus.err{color:var(--red);}

/* CATEGORY FILTER */
.cat-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:16px;}
.sec-label{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);font-family:'Space Grotesk',sans-serif;margin-bottom:10px;}
.cat-row{display:flex;flex-wrap:wrap;gap:6px;}
.cat-btn{font-size:0.75rem;padding:5px 12px;border-radius:999px;border:1px solid var(--border);color:var(--muted);cursor:pointer;font-family:'Space Grotesk',sans-serif;background:transparent;transition:all 0.15s;}
.cat-btn:hover{border-color:var(--accent);color:var(--accent2);}
.cat-btn.on{border-color:var(--accent);color:var(--accent2);background:rgba(123,94,167,0.18);}

/* PROGRESS */
.progress-row{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.prog-lbl{font-size:0.72rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;}
.prog-bar{flex:1;height:5px;background:var(--surface);border-radius:999px;overflow:hidden;}
.prog-fill{height:100%;background:var(--accent2);border-radius:999px;transition:width 0.5s;}
.prog-num{font-size:0.72rem;color:var(--accent2);font-family:'Space Grotesk',sans-serif;white-space:nowrap;}

/* GEN */
.gen-wrap{text-align:center;margin-bottom:16px;}
.btn-gen{background:linear-gradient(135deg,#7b5ea7,#9333ea);color:white;border:none;font-size:1rem;padding:13px 36px;border-radius:14px;box-shadow:0 4px 24px rgba(123,94,167,0.35);letter-spacing:0.02em;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-weight:600;transition:all 0.2s;}
.btn-gen:hover{box-shadow:0 6px 32px rgba(123,94,167,0.5);transform:translateY(-1px);}

/* CARD */
.c-card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:16px;transition:border-color 0.3s;}
.c-card.active{border-color:rgba(167,139,250,0.4);}
.c-card.ok{border-color:rgba(74,222,128,0.4);}
.c-card.so-so{border-color:rgba(245,200,66,0.35);}
.c-card.rework{border-color:rgba(248,113,113,0.3);}

/* SCENE */
.scene{position:relative;background:linear-gradient(135deg,rgba(123,94,167,0.28) 0%,rgba(26,26,53,0.7) 100%);padding:22px 20px 18px;border-bottom:1px solid var(--border);min-height:120px;display:flex;flex-direction:column;justify-content:flex-end;}
.scene-emoji{font-size:3.2rem;position:absolute;top:14px;right:18px;line-height:1;filter:drop-shadow(0 0 10px rgba(167,139,250,0.5));}
.scene-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.day-badge{background:var(--accent);color:white;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.68rem;letter-spacing:0.08em;padding:3px 10px;border-radius:999px;}
.cat-tag{font-size:0.68rem;color:var(--muted);font-family:'Space Grotesk',sans-serif;}
.scene-lbl{font-size:0.6rem;color:var(--dim);letter-spacing:0.12em;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;margin-bottom:6px;}
.scene-txt{font-size:1rem;line-height:1.65;color:var(--text);max-width:80%;}
.scene-txt em{color:var(--accent3);font-style:normal;font-weight:600;}

/* CHUNK BLOCK */
.chunk-block{padding:12px 18px;background:rgba(255,255,255,0.018);border-bottom:1px solid var(--border);}
.chunk-lbl{font-size:0.6rem;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;margin-bottom:8px;}
.chunk-card{background:var(--surface);border:1px solid rgba(167,139,250,0.2);border-radius:12px;padding:14px 16px;}
.chunk-es{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;color:var(--accent3);margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.chunk-play{background:var(--accent);color:white;border:none;border-radius:7px;width:30px;height:30px;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;}
.chunk-play:hover{filter:brightness(1.2);}
.chunk-play.playing{background:var(--gold);}

/* COLLAPSIBLE */
.lang-row{border-top:1px solid var(--border);overflow:hidden;}
.lang-row:first-of-type{border-top:1px solid rgba(167,139,250,0.15);margin-top:8px;}
.ltog{width:100%;text-align:left;background:transparent;border:none;padding:8px 0;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.ltog:hover .ltlbl{color:var(--accent2);}
.ltlbl{font-size:0.68rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;letter-spacing:0.08em;text-transform:uppercase;transition:color 0.15s;}
.ltarr{font-size:0.7rem;color:var(--dim);transition:transform 0.2s;}
.ltog.open .ltarr{transform:rotate(180deg);}
.lcont{max-height:0;overflow:hidden;transition:max-height 0.25s ease;}
.lcont.open{max-height:120px;padding-bottom:8px;}
.en-text{color:var(--blue);font-family:'Space Grotesk',sans-serif;font-size:0.92rem;display:block;}
.en-note{color:var(--dim);font-size:0.78rem;margin-top:4px;display:block;line-height:1.5;}
.zh-text{color:var(--muted);font-size:0.9rem;line-height:1.6;}

/* INPUT */
.input-zone{padding:14px 18px;border-bottom:1px solid var(--border);}
.input-lbl{font-size:0.68rem;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;margin-bottom:8px;}
.ans-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px 14px;color:var(--text);font-size:1rem;font-family:'Space Grotesk',sans-serif;outline:none;resize:none;min-height:64px;transition:border-color 0.2s;}
.ans-input:focus{border-color:var(--accent);}
.ans-input::placeholder{color:var(--dim);font-size:0.88rem;font-family:'Noto Sans TC',sans-serif;}
.input-actions{display:flex;gap:8px;margin-top:9px;align-items:center;}
.input-hint{flex:1;font-size:0.72rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;}

.btn{color:white;border:none;border-radius:10px;padding:9px 16px;font-size:0.82rem;font-family:'Space Grotesk',sans-serif;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn:hover{filter:brightness(1.12);transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn-primary{background:var(--accent);}
.btn-submit{background:linear-gradient(135deg,var(--accent),#9333ea);font-size:0.88rem;padding:10px 22px;border-radius:12px;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent2);filter:none;}
.btn-sm{padding:6px 12px;font-size:0.75rem;border-radius:8px;}

/* FEEDBACK */
.fb-zone{padding:14px 18px;display:none;}
.fb-zone.vis{display:block;}
.fb-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.fb-icon{font-size:1.4rem;}
.fb-title{font-size:0.9rem;font-weight:600;}
.fb-title.ok{color:var(--green);}
.fb-title.so-so{color:var(--gold);}
.fb-title.rework{color:var(--red);}
.xp-gained{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.88rem;color:var(--gold);}
.fb-body{font-size:0.85rem;line-height:1.75;color:var(--muted);background:rgba(255,255,255,0.03);border-radius:10px;padding:11px 13px;border-left:3px solid var(--accent);margin-bottom:10px;}
.fb-body.ok{border-left-color:var(--green);}
.fb-body.so-so{border-left-color:var(--gold);}
.fb-body.rework{border-left-color:var(--red);}

/* ANSWER REVIEW */
.answer-review{background:rgba(167,139,250,0.06);border:1px solid rgba(167,139,250,0.15);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
.review-row{display:flex;gap:8px;align-items:baseline;margin-bottom:4px;}
.review-lbl{font-size:0.62rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;letter-spacing:0.1em;text-transform:uppercase;min-width:36px;}
.review-txt{font-size:0.9rem;}
.review-txt.yours{color:var(--accent3);font-family:'Space Grotesk',sans-serif;}
.review-txt.model{color:var(--green);font-family:'Space Grotesk',sans-serif;}

.next-acts{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}

/* HISTORY */
.history-sec{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:16px;display:none;}
.hist-list{display:flex;flex-direction:column;gap:7px;margin-top:10px;}
.hist-item{display:flex;align-items:flex-start;gap:10px;padding:9px 11px;background:var(--surface);border-radius:10px;border-left:3px solid var(--border);font-size:0.8rem;}
.hist-item.ok{border-left-color:var(--green);}
.hist-item.so-so{border-left-color:var(--gold);}
.hist-item.rework{border-left-color:var(--red);}
.h-meta{min-width:36px;}
.h-day{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.68rem;color:var(--dim);}
.h-date{font-size:0.62rem;color:var(--dim);}
.h-ans{color:var(--accent3);font-family:'Space Grotesk',sans-serif;}
.h-chunk{color:var(--dim);font-size:0.73rem;margin-top:2px;}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:9px 18px;font-size:0.82rem;color:var(--accent3);font-family:'Space Grotesk',sans-serif;opacity:0;transition:all 0.3s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:480px){.scene-emoji{font-size:2.6rem;top:10px;right:12px;}.scene-txt{max-width:70%;}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">🔥 西語鍛造 <span>v3 · 語塊版</span></div>
  <div class="stats-row">
    <div class="chip s">🔥<span class="v" id="sStr">0</span></div>
    <div class="chip w">📚<span class="v" id="sDone">0</span></div>
    <div class="chip">⚡<span class="v" id="sXP">0</span></div>
  </div>
</div>

<div class="wrap">

<div class="xp-box">
  <div class="xp-top"><div class="xp-lbl">今日進度</div><div class="xp-num" id="xpDisp">0 / 100 XP</div></div>
  <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
  <div class="xp-lvl" id="xpLvl">Lv.1 初鍛者</div>
</div>

<div class="voice-bar">
  <label>🔊 西語音源</label>
  <select id="voiceSel"><option value="">偵測中…</option></select>
  <button class="vtest" onclick="testVoice()">試聽</button>
  <span class="vstatus" id="vStat">偵測中…</span>
</div>

<div class="cat-section">
  <div class="sec-label">🎭 情境分類</div>
  <div class="cat-row" id="catRow"></div>
  <div class="progress-row">
    <div class="prog-lbl">已練</div>
    <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    <div class="prog-num" id="progNum">0 / 0</div>
  </div>
</div>

<div class="gen-wrap">
  <button class="btn-gen" onclick="nextChallenge()">✨ 出題</button>
</div>

<div class="c-card" id="cCard" style="display:none">
  <div class="scene" id="scene">
    <div class="scene-emoji" id="sceneEmoji">🌟</div>
    <div class="scene-meta">
      <div class="day-badge" id="dayBadge">語塊 #1</div>
      <div class="cat-tag" id="catTag">日常</div>
    </div>
    <div class="scene-lbl">🎭 情境</div>
    <div class="scene-txt" id="sceneTxt">—</div>
  </div>

  <div class="chunk-block">
    <div class="chunk-lbl">🧩 今日語塊</div>
    <div class="chunk-card">
      <div class="chunk-es">
        <span id="chunkEs">—</span>
        <button class="chunk-play" id="chunkPlay" onclick="playChunk()" title="朗讀">▶</button>
      </div>
      <!-- EN collapsible -->
      <div class="lang-row">
        <button class="ltog" id="enTog" onclick="toggleL('en')">
          <span class="ltlbl">🇬🇧 English + 英西對照</span>
          <span class="ltarr">▾</span>
        </button>
        <div class="lcont" id="enCont">
          <span class="en-text" id="chunkEn">—</span>
          <span class="en-note" id="chunkEnNote"></span>
        </div>
      </div>
      <!-- ZH collapsible -->
      <div class="lang-row">
        <button class="ltog" id="zhTog" onclick="toggleL('zh')">
          <span class="ltlbl">🈳 中文意思</span>
          <span class="ltarr">▾</span>
        </button>
        <div class="lcont" id="zhCont">
          <span class="zh-text" id="chunkZh">—</span>
        </div>
      </div>
    </div>
  </div>

  <div class="input-zone">
    <div class="input-lbl">✍️ 用這個語塊造一句話</div>
    <textarea class="ans-input" id="ansIn" placeholder="直接寫出西語句子，語感對就好" rows="3"></textarea>
    <div class="input-actions">
      <div class="input-hint" id="inputHint">試著說出一個情境句</div>
      <button class="btn btn-ghost btn-sm" onclick="skipIt()">跳過</button>
      <button class="btn btn-submit" onclick="checkAns()">送出 →</button>
    </div>
  </div>

  <div class="fb-zone" id="fbZone">
    <div class="fb-head">
      <div class="fb-icon" id="fbIcon">—</div>
      <div class="fb-title" id="fbTitle">—</div>
      <div class="xp-gained" id="xpGain"></div>
    </div>
    <div class="fb-body" id="fbBody"></div>
    <div class="answer-review" id="ansReview">
      <div class="review-row">
        <span class="review-lbl">你</span>
        <span class="review-txt yours" id="revYours">—</span>
      </div>
      <div class="review-row">
        <span class="review-lbl">參考</span>
        <span class="review-txt model" id="revModel">—</span>
      </div>
    </div>
    <div class="next-acts">
      <button class="btn btn-primary btn-sm" onclick="nextChallenge()">下一個語塊 ➜</button>
      <button class="btn btn-ghost btn-sm" onclick="replayModel()">🔊 再聽一次</button>
      <button class="btn btn-ghost btn-sm" onclick="scrollHist()">紀錄</button>
    </div>
  </div>
</div>

<div class="history-sec" id="histSec">
  <div class="sec-label">📜 練習紀錄</div>
  <div class="hist-list" id="histList"></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════
// 語塊題庫 — 佩佩豬日常情境
// ══════════════════════════════════════
const CHUNKS = [
  // ── 起床 / 早晨 ──
  {id:'m1', cat:'☀️ 早晨', emoji:'☀️', situation:'早上孩子剛醒來，你走進房間，陽光剛剛灑進來',
   es:'¡Buenos días!', en:'Good morning!', enNote:'英西結構相同：直接感嘆句，不需主詞', zh:'早安！', hint:'開啟一天的第一句話', model:'¡Buenos días, mi amor!'},
  {id:'m2', cat:'☀️ 早晨', emoji:'☀️', situation:'孩子還賴在床上不想起來，你輕聲催促',

  {id:'m3', cat:'☀️ 早晨', emoji:'☀️', situation:'問孩子昨晚睡得好不好',
   es:'¿Has dormido bien?', en:'Did you sleep well?', enNote:'西語用現在完成式（has dormido），英語用過去簡單式', zh:'你睡得好嗎？', hint:'問候的延伸，比 buenos días 更深一層', model:'¿Has dormido bien, cariño?'},

  // ── 吃飯 ──
  {id:'e1', cat:'🍽️ 吃飯', emoji:'🍽️', situation:'叫孩子來吃飯，飯已經準備好了',
   es:'¡A comer!', en:"Let's eat! / Come and eat!", enNote:'¡A + 動詞原形！是西語特有的呼喚結構，英語無直接對應', zh:'來吃飯了！', hint:'短促有力，媽媽呼喚家人的經典句', model:'¡A comer, que se enfría!'},
  {id:'e2', cat:'🍽️ 吃飯', emoji:'🍽️', situation:'孩子說肚子餓，你問他想吃什麼',

// ── STATE ──
let ST = {xp:0,streak:0,done:[],history:[],curId:null,cats:new Set(),lastDate:null};
const LEVELS=[{min:0,lbl:'Lv.1 初鍛者',next:100},{min:100,lbl:'Lv.2 句子編者',next:250},{min:250,lbl:'Lv.3 語感覺醒',next:450},{min:450,lbl:'Lv.4 詞海衝浪',next:700},{min:700,lbl:'Lv.5 西語思考',next:1000},{min:1000,lbl:'Lv.6 直覺流',next:9999}];

// ── VOICE ──
let esVoices=[];
function loadVoices(){
  const all=window.speechSynthesis?speechSynthesis.getVoices():[];
  esVoices=all.filter(v=>v.lang&&v.lang.startsWith('es'));
  const sel=document.getElementById('voiceSel'),st=document.getElementById('vStat');
  if(!esVoices.length){sel.innerHTML='<option value="">無音源</option>';st.textContent='⚠️ 無音源（需系統安裝）';st.className='vstatus err';}
  else{sel.innerHTML=esVoices.map((v,i)=>`<option value="${i}">${v.name} (${v.lang})</option>`).join('');st.textContent=`✓ ${esVoices.length} 個音源`;st.className='vstatus ok';}
}
function testVoice(){speak('Hola, ¡buenos días!');}
function speak(text){
  if(!window.speechSynthesis){toast('此裝置不支援語音');return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const idx=parseInt(document.getElementById('voiceSel').value);
  if(esVoices[idx]){u.voice=esVoices[idx];u.lang=esVoices[idx].lang;}else{u.lang='es-ES';}
  u.rate=0.88;speechSynthesis.speak(u);
}
function playChunk(){
  const txt=document.getElementById('chunkEs').textContent;
  if(!txt||txt==='—')return;
  const btn=document.getElementById('chunkPlay');
  btn.textContent='⏹';btn.classList.add('playing');
  speak(txt);
  setTimeout(()=>{btn.textContent='▶';btn.classList.remove('playing');},3000);
}
function replayModel(){
  const cur=CHUNKS.find(c=>c.id===ST.curId);
  if(cur)speak(cur.model);
}

// ── LANG TOGGLE ──
function toggleL(l){
  document.getElementById(l+'Tog').classList.toggle('open');
  document.getElementById(l+'Cont').classList.toggle('open');
}

// ── CATEGORIES ──
function getAllCats(){return[...new Set(CHUNKS.map(c=>c.cat))];}
function renderCats(){
  const row=document.getElementById('catRow');
  row.innerHTML='';
  getAllCats().forEach(cat=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(ST.cats.size===0||ST.cats.has(cat)?' on':'');
    b.textContent=cat;
    b.onclick=()=>toggleCat(cat,b);
    row.appendChild(b);
  });
  const allBtn=document.createElement('button');
  allBtn.className='cat-btn'+(ST.cats.size===0?' on':'');
  allBtn.textContent='全部';
  allBtn.style.order='-1';
  allBtn.onclick=()=>{ST.cats.clear();renderCats();};
  row.prepend(allBtn);
  updateProgress();
}
function toggleCat(cat,btn){
  if(ST.cats.has(cat))ST.cats.delete(cat);
  else ST.cats.add(cat);
  renderCats();
}
function getPool(){
  return ST.cats.size===0?CHUNKS:CHUNKS.filter(c=>ST.cats.has(c.cat));
}
function updateProgress(){
  const pool=getPool();
  const done=pool.filter(c=>ST.done.includes(c.id)).length;
  const pct=pool.length?Math.round((done/pool.length)*100):0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progNum').textContent=`${done} / ${pool.length}`;
  document.getElementById('sDone').textContent=ST.done.length;
}

// ── NEXT CHALLENGE ──
function nextChallenge(){
  const pool=getPool();
  // 優先未做過的
  let undone=pool.filter(c=>!ST.done.includes(c.id));
  if(!undone.length){undone=pool;} // 全做完就重來
  const chunk=undone[Math.floor(Math.random()*undone.length)];
  ST.curId=chunk.id;
  document.getElementById('cCard').style.display='block';
  document.getElementById('cCard').className='c-card active';
  document.getElementById('scene').style.background='linear-gradient(135deg,rgba(123,94,167,0.28) 0%,rgba(26,26,53,0.7) 100%)';
  document.getElementById('sceneEmoji').textContent=chunk.emoji;
  document.getElementById('dayBadge').textContent='語塊 #'+chunk.id.replace(/[a-z]/g,'');
  document.getElementById('catTag').textContent=chunk.cat;
  document.getElementById('sceneTxt').textContent=chunk.situation;
  document.getElementById('chunkEs').textContent=chunk.es;
  document.getElementById('chunkEn').textContent=chunk.en;
  document.getElementById('chunkEnNote').textContent=chunk.enNote;
  document.getElementById('chunkZh').textContent=chunk.zh;
  document.getElementById('inputHint').textContent=chunk.hint;
  document.getElementById('ansIn').value='';
  document.getElementById('fbZone').className='fb-zone';
  // reset toggles
  ['en','zh'].forEach(l=>{document.getElementById(l+'Tog').classList.remove('open');document.getElementById(l+'Cont').classList.remove('open');});
  document.getElementById('chunkPlay').textContent='▶';
  document.getElementById('chunkPlay').classList.remove('playing');
  document.getElementById('cCard').scrollIntoView({behavior:'smooth',block:'center'});
}

// ── CHECK ANSWER ──
function checkAns(){
  const ans=document.getElementById('ansIn').value.trim();
  if(!ans){toast('先寫出你的句子');return;}
  const cur=CHUNKS.find(c=>c.id===ST.curId);
  if(!cur)return;

  // 簡單比對：是否包含語塊本身
  const esCore=cur.es.toLowerCase().replace(/[¡!¿?.,]/g,'').trim();
  const ansLow=ans.toLowerCase().replace(/[¡!¿?.,]/g,'').trim();
  const hasChunk=ansLow.includes(esCore.split(' ').slice(0,2).join(' '));

  let rating,icon,title,feedback,xpGain;
  if(hasChunk&&ans.length>cur.es.length){
    rating='ok';icon='✨';title='太有感覺了！';
    feedback='你不只用了語塊，還擴展了句子。這就是語感在發揮作用的樣子。';xpGain=30;
  }else if(hasChunk){
    rating='so-so';icon='💡';title='語塊用對了！';
    feedback='語塊本身用得準確。試試看下次加上一點情境或感受，句子會更活。';xpGain=15;
  }else if(ans.length>3){
    rating='so-so';icon='💡';title='勇敢說出來！';
    feedback='你說出了自己的句子，這很好。語塊是「'+cur.es+'」，下次試著把它放進你的句子裡。';xpGain=10;
  }else{
    rating='rework';icon='🔧';title='再試一次';
    feedback='語塊是「'+cur.es+'」，試著用它完整說一個情境。例如：'+cur.model;xpGain=5;
  }

  ST.xp+=xpGain;
  if(rating==='ok')ST.streak++;
  if(!ST.done.includes(cur.id))ST.done.push(cur.id);

  ST.history.unshift({id:cur.id,cat:cur.cat,answer:ans,rating,chunk:cur.es,date:new Date().toLocaleDateString('zh-TW')});
  if(ST.history.length>60)ST.history=ST.history.slice(0,60);

  document.getElementById('cCard').className='c-card '+rating;
  document.getElementById('fbIcon').textContent=icon;
  document.getElementById('fbTitle').textContent=title;
  document.getElementById('fbTitle').className='fb-title '+rating;
  document.getElementById('fbBody').textContent=feedback;
  document.getElementById('fbBody').className='fb-body '+rating;
  document.getElementById('xpGain').textContent='+'+xpGain+' XP';
  document.getElementById('revYours').textContent=ans;
  document.getElementById('revModel').textContent=cur.model;
  document.getElementById('fbZone').className='fb-zone vis';

  renderStats();updateXP();updateProgress();renderHistory();save();
  if(rating==='ok')setTimeout(()=>toast('✨ +'+xpGain+' XP！'),200);

  // 自動播放示範句
  setTimeout(()=>speak(cur.model),600);
}

function skipIt(){
  const cur=CHUNKS.find(c=>c.id===ST.curId);
  if(cur&&!ST.done.includes(cur.id)){}
  document.getElementById('cCard').style.display='none';
  toast('跳過');
}

// ── STATS / XP ──
function renderStats(){
  document.getElementById('sStr').textContent=ST.streak;
  document.getElementById('sDone').textContent=ST.done.length;
  document.getElementById('sXP').textContent=ST.xp;
}
function updateXP(){
  const lv=LEVELS.filter(l=>ST.xp>=l.min).pop()||LEVELS[0];
  const nx=LEVELS.find(l=>l.min>ST.xp);
  const inLv=ST.xp-lv.min,need=nx?nx.min-lv.min:1;
  const pct=Math.min(100,Math.round((inLv/need)*100));
  document.getElementById('xpFill').style.width=pct+'%';
  document.getElementById('xpDisp').textContent=nx?`${ST.xp} / ${nx.min} XP`:`${ST.xp} XP`;
  document.getElementById('xpLvl').textContent=lv.lbl;
}

// ── HISTORY ──
function renderHistory(){
  const sec=document.getElementById('histSec'),list=document.getElementById('histList');
  if(!ST.history.length){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=ST.history.slice(0,12).map(h=>`
    <div class="hist-item ${h.rating}">
      <div class="h-meta"><div class="h-day">${h.cat?.split(' ')[0]||'📌'}</div><div class="h-date">${h.date}</div></div>
      <div style="flex:1"><div class="h-ans">${h.answer}</div><div class="h-chunk">語塊：${h.chunk}</div></div>
    </div>`).join('');
}
function scrollHist(){document.getElementById('histSec').scrollIntoView({behavior:'smooth'});}

// ── SAVE / LOAD ──
function save(){ST.lastDate=new Date().toDateString();localStorage.setItem('forge_v3',JSON.stringify({...ST,cats:[...ST.cats]}));}
function init(){
  const saved=localStorage.getItem('forge_v3');
  if(saved){try{const d=JSON.parse(saved);ST={...ST,...d,cats:new Set(d.cats||[])};}catch(e){}}
  const today=new Date().toDateString();
  if(ST.lastDate&&ST.lastDate!==today){const yd=new Date();yd.setDate(yd.getDate()-1);if(ST.lastDate!==yd.toDateString())ST.streak=0;}
  renderCats();renderStats();updateXP();renderHistory();
  if(window.speechSynthesis){
    if(speechSynthesis.getVoices().length)loadVoices();
    else speechSynthesis.onvoiceschanged=loadVoices;
    setTimeout(loadVoices,800);
  }else{document.getElementById('vStat').textContent='不支援語音';document.getElementById('vStat').className='vstatus err';}
}

// ── TOAST ──
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2400);}

document.addEventListener('DOMContentLoaded',init);
</script>
