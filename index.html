<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 西語鍛造 Daily Forge</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
:root{
  --bg:#0d0d18;--surface:#141428;--card:#1a1a35;--border:#2a2a50;
  --accent:#7b5ea7;--accent2:#a78bfa;--accent3:#c4b5fd;
  --gold:#f5c842;--green:#4ade80;--red:#f87171;--blue:#60a5fa;
  --orange:#fb923c;--text:#e2e8f0;--muted:#94a3b8;--dim:#64748b;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;min-height:100vh;padding-bottom:100px;}
body::before{content:'';position:fixed;top:-20%;left:-10%;width:55%;height:55%;background:radial-gradient(ellipse,rgba(123,94,167,0.09) 0%,transparent 70%);pointer-events:none;}

/* ── HEADER ── */
.header{position:sticky;top:0;z-index:200;background:rgba(13,13,24,0.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;color:var(--accent3);white-space:nowrap;}
.logo span{color:var(--dim);font-weight:300;font-size:0.78rem;margin-left:5px;}
.hstats{display:flex;gap:7px;align-items:center;}
.chip{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:3px 10px;font-size:0.73rem;font-family:'Space Grotesk',sans-serif;}
.chip .v{font-weight:700;color:var(--accent2);}
.chip.s .v{color:var(--gold);}
.chip.done .v{color:var(--green);}

/* ── VIEWS ── */
.view{display:none;}
.view.active{display:block;}

/* ── HOME VIEW ── */
.home-wrap{max-width:700px;margin:0 auto;padding:18px 14px;}

/* XP */
.xp-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 18px;margin-bottom:14px;}
.xp-top{display:flex;justify-content:space-between;margin-bottom:7px;}
.xp-lbl{font-size:0.67rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;letter-spacing:0.1em;text-transform:uppercase;}
.xp-num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.82rem;color:var(--gold);}
.xp-track{height:7px;background:var(--surface);border-radius:999px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--gold));border-radius:999px;transition:width 0.9s cubic-bezier(.4,0,.2,1);}
.xp-row2{display:flex;justify-content:space-between;margin-top:7px;align-items:center;}
.xp-lvl{font-size:0.68rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;}
.streak-badge{display:flex;align-items:center;gap:5px;font-family:'Space Grotesk',sans-serif;font-size:0.75rem;color:var(--gold);}
.streak-badge.big{font-size:0.9rem;font-weight:700;}

/* VOICE */
.voice-bar{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:9px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.voice-bar label{font-size:0.73rem;color:var(--muted);font-family:'Space Grotesk',sans-serif;white-space:nowrap;}
.voice-bar select{flex:1;min-width:100px;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:5px 8px;font-size:0.77rem;font-family:inherit;outline:none;}
.voice-bar select:focus{border-color:var(--accent);}
.vtest{background:rgba(123,94,167,0.2);border:1px solid var(--accent);color:var(--accent2);border-radius:8px;padding:5px 12px;font-size:0.73rem;font-family:'Space Grotesk',sans-serif;cursor:pointer;}
.vtest:hover{background:rgba(123,94,167,0.35);}
.vstatus{font-size:0.7rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;}
.vstatus.ok{color:var(--green);}
.vstatus.err{color:var(--red);}

/* FULL-STREAK BANNER */
.streak-banner{background:linear-gradient(135deg,rgba(245,200,66,0.12),rgba(251,146,60,0.08));border:1px solid rgba(245,200,66,0.3);border-radius:14px;padding:14px 18px;margin-bottom:14px;display:none;}
.streak-banner.vis{display:flex;align-items:center;gap:12px;}
.sb-icon{font-size:2rem;}
.sb-text .sb-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.95rem;color:var(--gold);}
.sb-text .sb-sub{font-size:0.78rem;color:var(--muted);margin-top:3px;}

/* CATEGORY GRID */
.cat-grid-label{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);font-family:'Space Grotesk',sans-serif;margin-bottom:10px;}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.cat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 14px;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.cat-card::before{content:'';position:absolute;inset:0;background:var(--cat-color,rgba(123,94,167,0.0));transition:background 0.2s;}
.cat-card:hover{border-color:var(--accent2);transform:translateY(-2px);box-shadow:0 6px 24px rgba(123,94,167,0.2);}
.cat-card:hover::before{background:rgba(123,94,167,0.06);}
.cat-emoji-big{font-size:2rem;margin-bottom:8px;display:block;}
.cat-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:0.88rem;color:var(--text);margin-bottom:4px;}
.cat-count{font-size:0.72rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;}
.cat-prog{margin-top:8px;height:4px;background:var(--surface);border-radius:999px;overflow:hidden;}
.cat-prog-fill{height:100%;background:var(--accent2);border-radius:999px;transition:width 0.4s;}
.cat-done-badge{position:absolute;top:10px;right:10px;background:var(--green);color:#0a2010;font-size:0.6rem;font-family:'Space Grotesk',sans-serif;font-weight:700;padding:2px 7px;border-radius:999px;}

/* PASAPORTE PREVIEW */
.pasaporte-btn{width:100%;background:linear-gradient(135deg,rgba(245,200,66,0.1),rgba(123,94,167,0.1));border:1px solid rgba(245,200,66,0.25);border-radius:14px;padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.2s;margin-bottom:10px;}
.pasaporte-btn:hover{border-color:var(--gold);transform:translateY(-1px);}
.pb-icon{font-size:1.6rem;}
.pb-text .pb-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.9rem;color:var(--gold);}
.pb-text .pb-sub{font-size:0.75rem;color:var(--muted);margin-top:2px;}
.pb-arrow{margin-left:auto;color:var(--dim);font-size:0.9rem;}

/* ── CATEGORY VIEW ── */
.cat-view-wrap{max-width:700px;margin:0 auto;padding:16px 14px;}

.back-btn{display:flex;align-items:center;gap:8px;background:transparent;border:none;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:0.85rem;cursor:pointer;padding:0;margin-bottom:16px;transition:color 0.15s;}
.back-btn:hover{color:var(--accent2);}

.cat-header{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px;}
.ch-top{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
.ch-emoji{font-size:2.8rem;filter:drop-shadow(0 0 8px rgba(167,139,250,0.4));}
.ch-info .ch-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;color:var(--accent3);}
.ch-info .ch-sub{font-size:0.78rem;color:var(--muted);margin-top:4px;}
.ch-prog-row{display:flex;align-items:center;gap:10px;}
.ch-prog-bar{flex:1;height:6px;background:var(--surface);border-radius:999px;overflow:hidden;}
.ch-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width 0.5s;}
.ch-prog-num{font-size:0.73rem;color:var(--accent2);font-family:'Space Grotesk',sans-serif;white-space:nowrap;}

/* CHUNK CARDS LIST */
.chunks-list{display:flex;flex-direction:column;gap:14px;}

.chunk-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:border-color 0.25s;}
.chunk-card.seen{border-color:rgba(74,222,128,0.3);}

/* Scene / illustration */
.ck-scene{position:relative;padding:18px 18px 14px;background:linear-gradient(135deg,rgba(123,94,167,0.22) 0%,rgba(26,26,53,0.6) 100%);border-bottom:1px solid var(--border);min-height:90px;display:flex;align-items:flex-end;}
.ck-illus{position:absolute;top:0;right:0;bottom:0;width:90px;display:flex;align-items:center;justify-content:center;font-size:3rem;filter:drop-shadow(0 0 10px rgba(167,139,250,0.35));pointer-events:none;}
.ck-scene-txt{font-size:0.9rem;line-height:1.65;color:var(--text);max-width:calc(100% - 90px);}
.ck-scene-txt em{color:var(--accent3);font-style:normal;font-weight:600;}

/* ES headline */
.ck-es-row{padding:14px 16px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.ck-es{font-family:'Space Grotesk',sans-serif;font-size:1.25rem;font-weight:700;color:var(--accent3);flex:1;line-height:1.3;}
.play-btn{background:var(--accent);color:white;border:none;border-radius:8px;min-width:32px;height:32px;font-size:0.82rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;padding:0 8px;gap:4px;font-family:'Space Grotesk',sans-serif;}
.play-btn:hover{filter:brightness(1.2);}
.play-btn.playing{background:var(--gold);color:#1a1a00;}

/* BREAKDOWN TABLE */
.breakdown{padding:12px 16px;border-bottom:1px solid var(--border);}
.bd-label{font-size:0.62rem;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;margin-bottom:8px;}
.bd-table{width:100%;border-collapse:collapse;}
.bd-table th{font-size:0.67rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;letter-spacing:0.06em;text-transform:uppercase;text-align:left;padding:0 0 6px;border-bottom:1px solid var(--border);}
.bd-table td{padding:7px 0;border-bottom:1px solid rgba(42,42,80,0.5);vertical-align:top;}
.bd-table tr:last-child td{border-bottom:none;}
.td-chunk{font-family:'Space Grotesk',sans-serif;font-size:0.92rem;color:var(--accent3);font-weight:600;width:38%;padding-right:8px;}
.chunk-yg-link{
  color:var(--accent3);text-decoration:none;
  border-bottom:1.5px dashed rgba(196,181,253,0.4);
  transition:all 0.15s;display:inline;
}
.chunk-yg-link:hover{color:var(--accent2);border-bottom-color:var(--accent2);}
.td-zh{font-size:0.85rem;color:var(--muted);width:30%;padding-right:8px;}
.td-role{font-size:0.72rem;color:var(--dim);width:32%;}
.td-role span{background:rgba(123,94,167,0.15);border:1px solid rgba(167,139,250,0.15);border-radius:5px;padding:2px 6px;font-family:'Space Grotesk',sans-serif;}

/* LANG ROWS */
.lang-rows{border-bottom:1px solid var(--border);}
.ltog{width:100%;text-align:left;background:var(--surface);border:none;padding:9px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background 0.15s;}
.ltog:hover{background:rgba(123,94,167,0.08);}
.ltlbl{font-size:0.68rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;letter-spacing:0.08em;text-transform:uppercase;}
.ltarr{font-size:0.68rem;color:var(--dim);transition:transform 0.2s;}
.ltog.open .ltarr{transform:rotate(180deg);}
.lcont{max-height:0;overflow:hidden;transition:max-height 0.28s ease;background:rgba(255,255,255,0.018);}
.lcont.open{max-height:160px;}
.lcont-inner{padding:10px 16px 13px;}
.en-text{color:var(--blue);font-family:'Space Grotesk',sans-serif;font-size:0.9rem;display:block;margin-bottom:5px;}
.en-note{color:var(--dim);font-size:0.78rem;line-height:1.55;display:block;}
.zh-text{color:var(--muted);font-size:0.9rem;line-height:1.6;}

/* MODEL SENTENCE */
.model-row{padding:10px 16px;display:flex;align-items:center;gap:10px;}
.model-lbl{font-size:0.62rem;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;white-space:nowrap;}
.model-es{font-family:'Space Grotesk',sans-serif;font-size:0.92rem;color:var(--green);flex:1;}

/* YOUGLISH BUTTON */
.yg-btn{
  display:inline-flex;align-items:center;justify-content:center;
  background:rgba(239,68,68,0.15);
  border:1px solid rgba(239,68,68,0.35);
  color:#f87171;
  border-radius:8px;padding:0 9px;height:32px;
  font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:700;
  text-decoration:none;letter-spacing:0.04em;flex-shrink:0;
  transition:all 0.15s;
}
.yg-btn:hover{background:rgba(239,68,68,0.28);border-color:rgba(239,68,68,0.6);}
.yg-btn.yg-green{
  background:rgba(74,222,128,0.12);
  border-color:rgba(74,222,128,0.3);
  color:var(--green);
}
.yg-btn.yg-green:hover{background:rgba(74,222,128,0.25);}

/* SEEN BUTTON */
.ck-footer{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.btn-seen{background:transparent;border:1px solid var(--border);color:var(--dim);border-radius:8px;padding:7px 14px;font-size:0.78rem;font-family:'Space Grotesk',sans-serif;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.btn-seen:hover{border-color:var(--green);color:var(--green);}
.chunk-card.seen .btn-seen{border-color:var(--green);color:var(--green);background:rgba(74,222,128,0.08);}
.xp-tag{font-size:0.72rem;color:var(--gold);font-family:'Space Grotesk',sans-serif;}

/* ── PASAPORTE VIEW ── */
.pasaporte-wrap{max-width:700px;margin:0 auto;padding:16px 14px;}

.pasaporte-header{background:linear-gradient(135deg,rgba(245,200,66,0.12),rgba(123,94,167,0.08));border:1px solid rgba(245,200,66,0.25);border-radius:16px;padding:18px;margin-bottom:16px;}
.ph-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.ph-icon{font-size:2.5rem;}
.ph-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.1rem;color:var(--gold);}
.ph-sub{font-size:0.78rem;color:var(--muted);margin-top:3px;}

/* Streak calendar */
.streak-cal{margin-bottom:12px;}
.sc-label{font-size:0.67rem;color:var(--dim);letter-spacing:0.1em;text-transform:uppercase;font-family:'Space Grotesk',sans-serif;margin-bottom:8px;}
.sc-dots{display:flex;gap:5px;flex-wrap:wrap;}
.sc-dot{width:22px;height:22px;border-radius:5px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-family:'Space Grotesk',sans-serif;color:var(--dim);}
.sc-dot.done{background:rgba(74,222,128,0.2);border-color:rgba(74,222,128,0.4);color:var(--green);}
.sc-dot.today{border-color:var(--accent2);color:var(--accent2);}

/* bonus milestones */
.bonus-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.bonus-chip{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:0.75rem;font-family:'Space Grotesk',sans-serif;}
.bonus-chip .bc-streak{color:var(--gold);font-weight:700;}
.bonus-chip .bc-xp{color:var(--accent2);}
.bonus-chip.reached{border-color:var(--gold);background:rgba(245,200,66,0.08);}

/* history list */
.hist-section-lbl{font-size:0.68rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--dim);font-family:'Space Grotesk',sans-serif;margin-bottom:10px;margin-top:16px;}
.hist-list{display:flex;flex-direction:column;gap:8px;}
.hist-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:12px;}
.hi-emoji{font-size:1.4rem;flex-shrink:0;}
.hi-body{flex:1;}
.hi-chunk{font-family:'Space Grotesk',sans-serif;font-size:0.9rem;color:var(--accent3);font-weight:600;}
.hi-cat{font-size:0.72rem;color:var(--dim);margin-top:2px;}
.hi-date{font-size:0.7rem;color:var(--dim);font-family:'Space Grotesk',sans-serif;white-space:nowrap;}
.hi-xp{font-size:0.78rem;color:var(--gold);font-family:'Space Grotesk',sans-serif;font-weight:700;white-space:nowrap;}

.empty-hist{text-align:center;padding:32px 20px;color:var(--dim);font-size:0.88rem;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,13,24,0.96);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;z-index:200;}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;background:transparent;border:none;cursor:pointer;color:var(--dim);font-family:'Space Grotesk',sans-serif;font-size:0.65rem;letter-spacing:0.04em;transition:color 0.15s;}
.nav-btn:hover{color:var(--accent2);}
.nav-btn.active{color:var(--accent2);}
.nav-btn .nicon{font-size:1.2rem;}

.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--card);border:1px solid var(--accent);border-radius:12px;padding:8px 18px;font-size:0.82rem;color:var(--accent3);font-family:'Space Grotesk',sans-serif;opacity:0;transition:all 0.3s;z-index:999;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:480px){
  .cat-grid{grid-template-columns:1fr 1fr;}
  .ck-illus{width:70px;font-size:2.4rem;}
  .ck-scene-txt{max-width:calc(100% - 70px);}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">🔥 西語鍛造 <span>v4</span></div>
  <div class="hstats">
    <div class="chip s">🔥<span class="v" id="hStreak">0</span></div>
    <div class="chip done">✅<span class="v" id="hDone">0</span></div>
    <div class="chip">⚡<span class="v" id="hXP">0</span></div>
  </div>
</div>

<!-- ══ HOME VIEW ══ -->
<div class="view active" id="viewHome">
<div class="home-wrap">

  <!-- XP -->
  <div class="xp-box">
    <div class="xp-top"><div class="xp-lbl">學習進度</div><div class="xp-num" id="xpDisp">0 / 100 XP</div></div>
    <div class="xp-track"><div class="xp-fill" id="xpFill" style="width:0%"></div></div>
    <div class="xp-row2">
      <div class="xp-lvl" id="xpLvl">Lv.1 初鍛者</div>
      <div class="streak-badge"><span>🔥</span><span id="xpStreak">0 天連續</span></div>
    </div>
  </div>

  <!-- FULL-STREAK BANNER -->
  <div class="streak-banner" id="streakBanner">
    <div class="sb-icon">🎉</div>
    <div class="sb-text">
      <div class="sb-title" id="sbTitle">連續 7 天！+50 XP 獎勵</div>
      <div class="sb-sub">繼續保持全勤，下一個里程碑：14 天</div>
    </div>
  </div>

  <!-- VOICE -->
  <div class="voice-bar">
    <label>🔊 西語音源</label>
    <select id="voiceSel"><option value="">偵測中…</option></select>
    <button class="vtest" onclick="testVoice()">試聽</button>
    <span class="vstatus" id="vStat">偵測中…</span>
  </div>

  <!-- CATEGORIES -->
  <div class="cat-grid-label">選擇情境分類</div>
  <div class="cat-grid" id="catGrid"></div>

  <!-- 語塊存摺 BUTTON -->
  <button class="pasaporte-btn" onclick="showView('viewPasaporte')">
    <div class="pb-icon">📒</div>
    <div class="pb-text">
      <div class="pb-title">語塊存摺</div>
      <div class="pb-sub" id="pbSub">查看已學語塊 · 全勤紀錄</div>
    </div>
    <div class="pb-arrow">›</div>
  </button>

</div>
</div>

<!-- ══ CATEGORY VIEW ══ -->
<div class="view" id="viewCat">
<div class="cat-view-wrap">
  <button class="back-btn" onclick="showView('viewHome')">‹ 返回</button>
  <div class="cat-header">
    <div class="ch-top">
      <div class="ch-emoji" id="cvEmoji">☀️</div>
      <div class="ch-info">
        <div class="ch-name" id="cvName">早晨</div>
        <div class="ch-sub" id="cvSub">3 個語塊</div>
      </div>

// ── VOICE ──
let esVoices=[];
function loadVoices(){
  const all=window.speechSynthesis?speechSynthesis.getVoices():[];
  esVoices=all.filter(v=>v.lang&&v.lang.startsWith('es'));
  const sel=document.getElementById('voiceSel'),st=document.getElementById('vStat');
  if(!esVoices.length){sel.innerHTML='<option value="">無音源</option>';st.textContent='⚠️ 需系統安裝西語音源';st.className='vstatus err';}
  else{sel.innerHTML=esVoices.map((v,i)=>`<option value="${i}">${v.name} (${v.lang})</option>`).join('');st.textContent=`✓ ${esVoices.length} 個音源`;st.className='vstatus ok';}
}
function testVoice(){speak('¡Hola! Buenos días.');}
function speak(text,btnId){
  if(!window.speechSynthesis){toast('此裝置不支援語音');return;}
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const idx=parseInt(document.getElementById('voiceSel').value);
  if(esVoices[idx]){u.voice=esVoices[idx];u.lang=esVoices[idx].lang;}else{u.lang='es-ES';}
  u.rate=0.87;
  if(btnId){
    const btn=document.getElementById(btnId);
    if(btn){btn.textContent='⏹';btn.classList.add('playing');}
    u.onend=()=>{if(btn){btn.textContent='▶';btn.classList.remove('playing');}};
  }
  speechSynthesis.speak(u);
}

// ── VIEWS ──
let currentCat=null;
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    const map={viewHome:0,viewCat:1,viewPasaporte:2};
    b.classList.toggle('active',map[id]===i);
  });
  if(id==='viewPasaporte')renderPasaporte();
  if(id==='viewHome')renderHome();
  window.scrollTo(0,0);
}
function showCatFromNav(){
  if(currentCat)showCatView(currentCat);
  else showView('viewHome');
}

// ── HOME ──
function getAllCats(){
  const order=['☀️ 早晨','🍽️ 吃飯','🧸 玩耍','💜 情緒','🌙 睡前','🚗 出門','🏠 家務','✨ 鼓勵','📍 介系詞'];
  return order.filter(c=>CHUNKS.some(ch=>ch.cat===c));
}

function renderHome(){
  const grid=document.getElementById('catGrid');
  grid.innerHTML='';
  const cats=getAllCats();
  const COLORS={'☀️ 早晨':'rgba(245,200,66,0.08)','🍽️ 吃飯':'rgba(251,146,60,0.08)','🧸 玩耍':'rgba(167,139,250,0.08)','💜 情緒':'rgba(248,113,113,0.08)','🌙 睡前':'rgba(96,165,250,0.08)','🚗 出門':'rgba(74,222,128,0.08)','🏠 家務':'rgba(167,139,250,0.06)','✨ 鼓勵':'rgba(245,200,66,0.06)','📍 介系詞':'rgba(96,165,250,0.1)'};
  cats.forEach(cat=>{
    const chunks=CHUNKS.filter(c=>c.cat===cat);
    const seenCount=chunks.filter(c=>ST.seen.includes(c.id)).length;
    const pct=chunks.length?Math.round(seenCount/chunks.length*100):0;
    const done=seenCount===chunks.length&&chunks.length>0;
    const emoji=cat.split(' ')[0];
    const name=cat.split(' ').slice(1).join(' ');
    const card=document.createElement('div');
    card.className='cat-card';
    card.style.setProperty('--cat-color',COLORS[cat]||'');
    card.innerHTML=`${done?'<div class="cat-done-badge">✓ 完成</div>':''}
      <span class="cat-emoji-big">${emoji}</span>
      <div class="cat-name">${name}</div>
      <div class="cat-count">${chunks.length} 個語塊 · 已看 ${seenCount}</div>
      <div class="cat-prog"><div class="cat-prog-fill" style="width:${pct}%"></div></div>`;
    card.onclick=()=>showCatView(cat);
    grid.appendChild(card);
  });
  document.getElementById('pbSub').textContent=`已學 ${ST.seen.length} 個語塊 · 連續 ${ST.streak} 天`;
  updateXPBar();
  renderStreakBanner();
}

function renderStreakBanner(){
  const banner=document.getElementById('streakBanner');
  const bonus=STREAK_BONUSES.filter(b=>ST.streak>=b.days).pop();

    banner.classList.add('vis');
    document.getElementById('sbTitle').textContent=`連續 ${ST.streak} 天！+${bonus.xp} XP 里程碑`;
  }else{banner.classList.remove('vis');}
}

// ── YOUGLISH URL ──
function ygUrl(text){
  // 取前三個有意義的詞做搜尋，去掉標點
  const clean=text.replace(/[¡!¿?.,;:""'']/g,'').trim();
  const words=clean.split(/\s+/).slice(0,4).join('+');
  const encoded=encodeURIComponent(words).replace(/%2B/g,'+');
  return 'https://youglish.com/pronounce/'+encoded+'/spanish';
}

function toggleL(togId,contId){
  document.getElementById(togId).classList.toggle('open');
  document.getElementById(contId).classList.toggle('open');
}

function markSeen(id){
  const ch=CHUNKS.find(c=>c.id===id);
  if(!ch)return;
  const wasNew=!ST.seen.includes(id);
  if(wasNew){
    ST.seen.push(id);
    ST.xp+=10;
    ST.history.unshift({id,cat:ch.cat,es:ch.es,emoji:ch.illus,date:new Date().toLocaleDateString('zh-TW'),xp:10});
    if(ST.history.length>100)ST.history=ST.history.slice(0,100);
    checkStreakToday();
    toast('✅ 已學 +10 XP');
  }
  document.getElementById('ck_'+id).classList.add('seen');
  document.getElementById('seen_'+id).textContent='✅ 已學過';
  updateCatProg(currentCat);
  renderStats();
  updateXPBar();
  save();
}

function checkStreakToday(){
  const today=new Date().toDateString();
  if(!ST.streakDates)ST.streakDates=[];
  if(!ST.streakDates.includes(today)){
    ST.streakDates.push(today);
    // recalc streak
    let s=0,d=new Date();
    while(ST.streakDates.includes(d.toDateString())){s++;d.setDate(d.getDate()-1);}
    const prevStreak=ST.streak;
    ST.streak=s;
    // bonus
    STREAK_BONUSES.forEach(b=>{
      if(prevStreak<b.days&&ST.streak>=b.days){ST.xp+=b.xp;toast(`🔥 ${b.days} 天全勤！+${b.xp} XP 獎勵`);}
    });
  }
}

// ── PASAPORTE VIEW ──
function renderPasaporte(){
  renderStreakCal();
  renderBonusMilestones();
  renderHistList();
}

function renderStreakCal(){
  const dots=document.getElementById('scDots');
  dots.innerHTML='';
  const today=new Date();
  const dates=ST.streakDates||[];
  for(let i=13;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const ds=d.toDateString();
    const isToday=i===0;
    const isDone=dates.includes(ds);
    const el=document.createElement('div');
    el.className='sc-dot'+(isDone?' done':'')+(isToday?' today':'');
    el.textContent=isDone?'✓':(isToday?'今':'');
    el.title=d.toLocaleDateString('zh-TW');
    dots.appendChild(el);
  }
}

function renderBonusMilestones(){
  const row=document.getElementById('bonusRow');
  row.innerHTML='';
  STREAK_BONUSES.forEach(b=>{
    const reached=ST.streak>=b.days;
    const chip=document.createElement('div');
    chip.className='bonus-chip'+(reached?' reached':'');
    chip.innerHTML=`<span class="bc-streak">🔥${b.days}天</span><span class="bc-xp">+${b.xp}XP</span>${reached?'✓':''}`;
    row.appendChild(chip);
  });
}

function renderHistList(){
  const list=document.getElementById('histList');
  if(!ST.history.length){list.innerHTML='<div class="empty-hist">還沒有紀錄<br>去學習第一個語塊吧 🌟</div>';return;}
  list.innerHTML=ST.history.slice(0,30).map(h=>`
    <div class="hist-item">
      <div class="hi-emoji">${h.emoji||'🧩'}</div>
      <div class="hi-body">

      </div>
      <div class="hi-date">${h.date}</div>
      <div class="hi-xp">+${h.xp}XP</div>
    </div>`).join('');
}

// ── XP ──
function updateXPBar(){
  const lv=LEVELS.filter(l=>ST.xp>=l.min).pop()||LEVELS[0];
  const nx=LEVELS.find(l=>l.min>ST.xp);
  const inLv=ST.xp-lv.min,need=nx?nx.min-lv.min:1;
  const pct=Math.min(100,Math.round((inLv/need)*100));
  document.getElementById('xpFill').style.width=pct+'%';
  document.getElementById('xpDisp').textContent=nx?`${ST.xp} / ${nx.min} XP`:`${ST.xp} XP`;
  document.getElementById('xpLvl').textContent=lv.lbl;
  document.getElementById('xpStreak').textContent=`${ST.streak} 天連續`;
}

function renderStats(){
  document.getElementById('hStreak').textContent=ST.streak;
  document.getElementById('hDone').textContent=ST.seen.length;
  document.getElementById('hXP').textContent=ST.xp;
}

// ── SAVE / LOAD ──
function save(){localStorage.setItem('forge_v4',JSON.stringify(ST));}
function init(){
  const saved=localStorage.getItem('forge_v4');
  if(saved){try{ST={...ST,...JSON.parse(saved)};}catch(e){}}
  if(!ST.streakDates)ST.streakDates=[];
  renderStats();renderHome();
  if(window.speechSynthesis){
    if(speechSynthesis.getVoices().length)loadVoices();
    else speechSynthesis.onvoiceschanged=loadVoices;
    setTimeout(loadVoices,900);
  }else{document.getElementById('vStat').textContent='不支援語音';document.getElementById('vStat').className='vstatus err';}
}

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
